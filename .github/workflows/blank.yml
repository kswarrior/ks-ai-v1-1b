name: Clone Gemma 3 1B to Repo

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install hf CLI and Git LFS
        run: |
          git lfs install
          curl -LsSf https://hf.co/cli/install.sh | bash
          echo "$HOME/.huggingface/bin" >> $GITHUB_PATH

      - name: Download Gemma 3 1B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 2026 Best Practice: Login first to verify gated access
          hf auth login --token $HF_TOKEN --add-to-git-credential
          
          mkdir -p ks-ai-model
          # Download files into the local directory
          hf download google/gemma-3-1b-it --local-dir ./ks-ai-model

      - name: Track and Commit
        run: |
          git config --global user.name "KS-AI-Bot-Deployer"
          git config --global user.email "bot@ks-ai.com"
          
          cd ks-ai-model
          git lfs track "*.bin" "*.safetensors" "*.gguf" "*.model" "*.pt"
          cd ..
          
          git add .gitattributes
          git add ks-ai-model/
          
          # Only push if there are new files
          git diff --quiet && git diff --staged --quiet || git commit -m "Add Gemma 3 1B weights"
          git push origin main
