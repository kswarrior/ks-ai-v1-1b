name: Clone Gemma 3 1B to Repo

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS
        run: |
          git lfs install

      - name: Download Gemma 3 1B Files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ks-ai-model
          cd ks-ai-model
          hf download google/gemma-3-1b-it
          git lfs track "*.bin"
          git lfs track "*.safetensors"
          git lfs track "*.gguf"

      - name: Commit and Push to your Repo
        run: |
          git config --global user.name "KS-AI-Bot-Deployer"
          git config --global user.email "bot@ks-ai.com"
          git add .gitattributes
          git add ks-ai-model/*
          git commit -m "Add Gemma 3 1B weights for KS AI"
          git push origin main
