name: Clone Gemma 3 1B to Repo

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub
        run: pip install --upgrade huggingface_hub

      - name: Download Gemma 3 1B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ks-ai-model
          
          # Simplified 'hf' command based on your terminal output
          hf download google/gemma-3-1b-it model.safetensors \
            --local-dir ks-ai-model \
            --token $HF_TOKEN

      - name: Commit and Push
        run: |
          git config --global user.name "KS-AI-Bot-Deployer"
          git config --global user.email "bot@ks-ai.com"
          
          # 1. Initialize LFS and track safetensors
          git lfs install
          git lfs track "*.safetensors"
          git add .gitattributes
          
          # 2. Stage the model file
          git add ks-ai-model/model.safetensors
          
          # 3. Check status and push
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Add Gemma 3 1B weights via Git LFS"
            # Increase buffer for large file upload
            git config http.postBuffer 524288000
            git push origin main
            echo "✅ Model successfully pushed to repo!"
          else
            echo "No changes to commit"
          fi
