name: Clone Gemma 3 1B to Repo

on:
  workflow_dispatch:

jobs:
  download-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download Gemma 3 1B
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p ks-ai-model
          # Use the 'hf' tool as suggested by your environment hints
          # Note: We pass the token directly to authenticate the download
          hf download google/gemma-3-1b-it --include "model.safetensors" --local-dir ks-ai-model --token $HF_TOKEN

      - name: Commit and Push
        run: |
          git config --global user.name "KS-AI-Bot-Deployer"
          git config --global user.email "bot@ks-ai.com"
          
          # Stage the specific model file
          git add ks-ai-model/model.safetensors
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Add Gemma 3 1B weights via hf tool (automated)"
            git push origin main
            echo "✅ Model successfully pushed to repo!"
          else
            echo "No changes to commit (model already up to date)"
          fi
